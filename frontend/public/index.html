<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Server. File Storage</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css"
    />
  </head>
  <body>
    <div class="app">
      <!-- Header Section-->
      <header class="header">
        <h1>File Storage</h1>
        <p class="subtitle">Upload and download your files</p>
      </header>

      <!-- Main Section-->
      <main>
        <!-- Upload card -->
        <section class="card">
          <h2>Upload file</h2>
          <form id="fileInputForm" class="upload-form">
            <label class="file-picker">
              <input id="fileInput" type="file" />
              <span id="selectedFile">No file selected</span>
            </label>
            <button id="submitBtn" class="primary-btn" type="submit">
              Upload
            </button>
          </form>
        </section>

        <!-- Files card -->
        <section class="card">
          <h2>Files</h2>

          <!-- Files table -->
          <table class="files-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Size</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </section>
      </main>
    </div>
    <div id="toastContainer"></div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
